<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Space Explorer | Noticias</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
  <h1>NASA Explorer</h1>
  <div style="display:flex; gap:10px; align-items:center;">
    <a class="btn btn-primary" href="index.html">📰 Imagenes</a>
    <button class="btn btn-primary" onclick="showFavorites()">⭐ Favoritos</button>
  </div>
</nav>

<section class="hero">
  <h2>Noticias NASA</h2>
  <p>Explora imágenes relacionadas con noticias y misiones</p>
</section>

<div class="controls">
  <input type="date" id="start" aria-label="Fecha inicio" title="Fecha inicio">
  <input type="date" id="end" aria-label="Fecha fin" title="Fecha fin">
  <button class="btn btn-primary" style="background:#334155; color:white;" id="loadAll">📰 Cargar Noticias</button>
  <button class="btn btn-primary" style="background:#334155; color:white;" id="loadToday">📅 Hoy</button>
  <button class="btn btn-primary" id="searchRange">🔍 Buscar Rango</button>
</div>

<div id="statusContainer"></div>
<div class="gallery" id="gallery"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close-btn" id="closeModalBtn">✕</button>
    <div id="modalBody" class="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="satellites.js"></script>
</body>
</html>
